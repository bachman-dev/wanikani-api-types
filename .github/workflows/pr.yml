name: Tests (PR)
on:
  merge_group:
  pull_request:
    branches:
      - main
      - v3
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
jobs:
  test:
    name: "Lint, Test & Docs"
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install
      - name: Lint Code
        run: pnpm lint
      - name: Run Unit Tests
        run: pnpm test
      - name: Upload Coverage Reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Build Documentation
        run: pnpm build:docs
  check-ts-versions:
    name: "Build (TypeScript ${{ matrix.typescript-version }})"
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ["5.4", "5.5", "5.6", "5.7", "5.8", "5.9", "6.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install
      - name: Install TypeScript ${{ matrix.typescript-version }}
        run: 'pnpm add --save-dev typescript@"~${{ matrix.typescript-version }}"'
      - name: Build Library
        run: pnpm build
  gate:
    name: "All PR Checks Passed"
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    needs: [test, check-ts-versions]
    steps:
      - run: exit 0

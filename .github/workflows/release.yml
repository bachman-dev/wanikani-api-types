name: Release
on:
  release:
    types: [published]
jobs:
  test:
    name: "Publish Release"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - name: Install Dependencies
        run: pnpm install
      - name: Lint Code
        run: pnpm lint
      - name: Run Unit Tests
        run: pnpm test
      - name: Build Documentation
        run: pnpm build:docs
      - name: Build Library
        run: pnpm build
      - name: Publish Library (Prerelease)
        if: ${{ github.event.release.prerelease }}
        run: pnpm publish --tag=next --access=public --recursive --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Publish Library (Latest)
        if: ${{ !github.event.release.prerelease }}
        run: pnpm publish --access=public --recursive --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Publish Documentation
        run: "curl -X POST ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
